# Remap prefix from Ctrl-b to Ctrl-a (easier to reach)
set -g prefix C-a
unbind C-b
bind C-a send-prefix

# Enable mouse (scroll, click panes, resize panes)
set -g mouse on

# Vi keys in copy mode
set -g mode-keys vi

# Near-instant escape (default 500ms kills vim responsiveness)
set -g escape-time 10

# Scrollback buffer
set -g history-limit 500000

# Start numbering at 1 (0 is far away)
set -g base-index 1
setw -g pane-base-index 1

# Auto renumber windows when one is closed
set -g renumber-windows on

# Intuitive splits, keeping current directory
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"

# New windows keep current directory
bind c new-window -c "#{pane_current_path}"

# Vi-style pane navigation
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# Easy config reload
bind r source-file ~/.tmux.conf \; display "Reloaded"

# Enable focus events
set -g focus-events on

set -g allow-passthrough on

set -as terminal-features ",*:sixel"

set -as terminal-features ",*:hyperlinks"
